<div class="task-list">
  <!-- Loading State -->
  <div *ngIf="isLoading()" class="loading-state">
    <p-progressSpinner [style]="{ width: '48px', height: '48px' }" strokeWidth="3"></p-progressSpinner>
    <span class="loading-text">Loading your tasks...</span>
  </div>

  <!-- Empty State -->
  <div *ngIf="!isLoading() && !hasTasks()" class="empty-state">
    <div class="empty-icon">
      <i class="pi pi-check-circle"></i>
    </div>
    <h3 class="empty-message">All caught up!</h3>
    <p class="empty-subtitle">{{ emptyMessage() }}</p>
  </div>

  <!-- Task List -->
  <div *ngIf="!isLoading() && hasTasks()" class="tasks-container">
    <app-task-card
      *ngFor="let task of tasks(); trackBy: trackByTaskId"
      [task]="task"
      [category]="getCategoryForTask(task)"
      [showCompleteButton]="showCompleteButton()"
      [showReopenButton]="showReopenButton()"
      (editTask)="editTask.emit($event)"
      (completeTask)="completeTask.emit($event)"
      (reopenTask)="reopenTask.emit($event)"
      (deleteTask)="deleteTask.emit($event)">
    </app-task-card>
  </div>
</div>
