<div class="task-card" [class.task-done]="isDone()" [class.task-overdue]="isOverdue()">
  <div class="task-header">
    <div class="task-checkbox-title">
      <p-checkbox
        [ngModel]="isDone()"
        (ngModelChange)="onCheckboxToggle($event)"
        [binary]="true">
      </p-checkbox>
      <h3 class="task-title">{{ task().title }}</h3>
    </div>

    <div class="task-actions">
      <p-button
        *ngIf="showReopenButton() && isDone()"
        icon="pi pi-undo"
        severity="secondary"
        [text]="true"
        [rounded]="true"
        size="small"
        (onClick)="onReopen()"
        pTooltip="Reopen task"
        tooltipPosition="top">
      </p-button>

      <p-button
        icon="pi pi-pencil"
        severity="secondary"
        [text]="true"
        [rounded]="true"
        size="small"
        (onClick)="onEdit()"
        pTooltip="Edit task"
        tooltipPosition="top">
      </p-button>

      <p-button
        icon="pi pi-trash"
        severity="danger"
        [text]="true"
        [rounded]="true"
        size="small"
        (onClick)="onDelete()"
        pTooltip="Delete task"
        tooltipPosition="top">
      </p-button>
    </div>
  </div>

  <p class="task-description" *ngIf="task().description">
    {{ task().description }}
  </p>

  <div class="task-meta">
    <div class="task-badges">
      <app-category-badge [category]="category()"></app-category-badge>
      <app-priority-badge [priority]="task().priority"></app-priority-badge>
      <app-status-badge [status]="task().status"></app-status-badge>
    </div>

    <div class="task-due-date" *ngIf="dueDateFormatted()" [class.overdue]="isOverdue()">
      <i class="pi pi-calendar"></i>
      <span>{{ dueDateFormatted() }}</span>
      <span *ngIf="isOverdue()" class="overdue-label">(Overdue)</span>
    </div>
  </div>
</div>
