<div class="page-container">
  <!-- Header Section -->
  <header class="dashboard-header">
    <div class="header-content">
      <h1>Nutrition Tracker</h1>
      <p class="subtitle">Fuel your body, reach your goals.</p>
    </div>
    <div class="header-actions">
      <p-button 
        icon="pi pi-cog" 
        [text]="true" 
        routerLink="goals" 
        pTooltip="Nutrition Goals"
        styleClass="mr-2"
      />
      <p-button 
        label="Log Meal" 
        icon="pi pi-plus" 
        routerLink="add" 
        styleClass="p-button-raised p-button-primary rounded-pill"
      />
    </div>
  </header>

  @if (facade.isLoading()) {
    <div class="loading-state">
      <p-skeleton width="100%" height="300px" borderRadius="1.5rem" />
      <div class="skeleton-grid">
        <p-skeleton width="100%" height="150px" borderRadius="1.5rem" />
        <p-skeleton width="100%" height="150px" borderRadius="1.5rem" />
        <p-skeleton width="100%" height="150px" borderRadius="1.5rem" />
      </div>
    </div>
  } @else {
    <div class="dashboard-grid">
      <!-- Main Progress Section -->
      <section class="progress-section card-glass">
        <div class="ring-wrapper">
          @if (facade.dailyProgress(); as progress) {
            <app-progress-ring 
              [progress]="progress.calories.percent" 
              [radius]="90" 
              [stroke]="12"
            >
              <div class="ring-text">
                <span class="calories">{{ progress.calories.remaining | number:'1.0-0' }}</span>
                <span class="label">kcal left</span>
              </div>
            </app-progress-ring>
          }
        </div>
        <div class="macros-wrapper">
          <app-nutrient-display [nutrients]="nutrientValues()" size="md" />
        </div>
      </section>

      <!-- Timeline Section -->
      <section class="timeline-section">
        <div class="section-header">
          <h2>Today's Meals</h2>
          <p-button 
            label="History" 
            icon="pi pi-history" 
            [text]="true" 
            routerLink="history"
          />
        </div>
        <app-meal-timeline 
          [meals]="facade.todayMeals()" 
          (deleteMeal)="onDeleteMeal($event)" 
        />
      </section>
    </div>
  }
</div>
