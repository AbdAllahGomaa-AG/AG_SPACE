<div
  class="dashboard-shell"
  [ngClass]="{ 'sidebar-mobile-open': mobileMenuOpen() }"
>
  <app-top-navbar
    (menuToggleClicked)="onMenuToggle()"
    [sidebarCollapsed]="sidebarCollapsed()"
  />

  <div class="dashboard-layout">
    <app-side-navigation
      [collapsed]="sidebarCollapsed()"
      [mobileMenuOpen]="mobileMenuOpen()"
      (closeMobileMenu)="toggleMobileMenu()"
    />

    <div
      class="sidebar-overlay"
      [class.visible]="mobileMenuOpen()"
      (click)="toggleMobileMenu()"
      aria-hidden="true"
    ></div>

    <main
      class="dashboard-content"
      [ngClass]="{ 'dashboard-content-overlay': mobileMenuOpen() }"
      aria-live="polite"
    >
      <router-outlet />
    </main>
  </div>
</div>
