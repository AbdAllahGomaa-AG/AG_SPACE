<aside
  class="sidebar"
  [ngClass]="{
    'sidebar-collapsed': collapsed(),
    'sidebar-mobile-open': mobileMenuOpen()
  }"
  aria-label="Sidebar navigation"
>
  <div class="sidebar-header">
    <span class="sidebar-header-title">Menu</span>
    <p-button
      icon="pi pi-times"
      severity="secondary"
      variant="text"
      [rounded]="true"
      class="sidebar-close-button"
      ariaLabel="Close menu"
      (onClick)="onCloseClick()"
    />
  </div>
  <nav class="sidebar-nav">
    <div class="nav-section">
      @for (link of mainLinks; track link.label) {
        <a
          class="nav-link"
          [routerLink]="link.route || '/'"
          routerLinkActive="active"
          [routerLinkActiveOptions]="{ exact: link.route === '/' }"
          [attr.aria-current]="link.label === 'Overview' ? 'page' : null"
          [pTooltip]="collapsed() ? link.label : undefined"
          tooltipPosition="right"
          (click)="onNavItemClick()"
        >
          <i [class]="link.icon"></i>
          <span class="nav-link-label" [class.hidden]="collapsed()">{{ link.label }}</span>
        </a>
      }
    </div>
  </nav>
</aside>
