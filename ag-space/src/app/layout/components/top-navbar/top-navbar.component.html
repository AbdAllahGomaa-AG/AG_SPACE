<header class="top-navbar">
  <div class="navbar-start">
    <p-button
      icon="pi pi-bars"
      severity="secondary"
      variant="text"
      [rounded]="true"
      ariaLabel="Toggle navigation menu"
      (onClick)="onMenuToggle()"
    />
    <div class="navbar-brand">
      <span class="workspace-title">Workspace</span>
      <span class="page-title">Overview</span>
    </div>
  </div>

  <div class="navbar-center">
    <div class="search-container">
      <i class="pi pi-search search-icon"></i>
      <input
        type="text"
        class="search-input"
        placeholder="Search..."
        aria-label="Search"
      />
      <span class="search-shortcut">⌘K</span>
    </div>
  </div>

  <div class="navbar-end">
    <p-button
      [icon]="isDarkMode() ? 'pi pi-sun' : 'pi pi-moon'"
      severity="secondary"
      variant="text"
      [rounded]="true"
      ariaLabel="Toggle theme"
      (onClick)="toggleTheme()"
    />
    <p-button
      icon="pi pi-bell"
      severity="secondary"
      variant="text"
      [rounded]="true"
      ariaLabel="Notifications"
    />
    <div class="profile-section">
      <div class="profile-avatar" [pTooltip]="profile()?.full_name ?? 'User'" tooltipPosition="bottom">
        <span class="avatar-initials">{{ userInitials() }}</span>
      </div>
      <p-button
        icon="pi pi-sign-out"
        severity="secondary"
        variant="text"
        [rounded]="true"
        ariaLabel="Sign out"
        (onClick)="onLogout()"
        class="logout-button"
      />
    </div>
  </div>
</header>
